# ==============================================================================
# ALEX'S CONFIG FOR KITTY
# ==============================================================================

include colors-wallust.conf

# ------------------------------------------------------------------------------
# 1. FUENTES Y TIPOGRAFÍA
# ------------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11.0

# Ajustes de renderizado fino para Linux
disable_ligatures never
box_drawing_scale 0.001, 1, 1.5, 2

# ------------------------------------------------------------------------------
# 2. RENDIMIENTO Y CONFIGURACIÓN DEL SISTEMA
# ------------------------------------------------------------------------------
# Tasa de refresco sincronizada (baja latencia para monitores de alta tasa)
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# Historial de scrollback (líneas que guarda en memoria)
scrollback_lines 10000

# Desactivar el molesto pitido del sistema
enable_audio_bell no

# ------------------------------------------------------------------------------
# 3. DISEÑO DE LA VENTANA (WINDOW LAYOUT & RICE)
# ------------------------------------------------------------------------------
# Márgenes internos (respiro visual entre los bordes y el texto)
window_padding_width 10

# Opacidad del fondo (Ajusta esto según tus gustos estéticos en Hyprland)
background_opacity 0.75
dynamic_background_opacity yes

# Confirmación al cerrar ventanas con procesos corriendo
confirm_os_window_close 0

# Ocultar la barra de título clásica de las ventanas
hide_window_decorations yes

# ------------------------------------------------------------------------------
# 4. PERSONALIZACIÓN DE PESTAÑAS (TABS)
# ------------------------------------------------------------------------------
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# ------------------------------------------------------------------------------
# 5. INTEGRACIÓN CON EL PORTAPAPELES (CLIPBOARD)
# ------------------------------------------------------------------------------
# Qué portapapeles usar al copiar/pegar
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ------------------------------------------------------------------------------
# 6. ATAJOS DE TECLADO PERSONALIZADOS (KEYBINDS)
# ------------------------------------------------------------------------------
# Forzar portapapeles clásico
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Gestión de pestañas (Tabs)
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# Cambiar la opacidad del fondo al vuelo (Genial para programar de noche)
map ctrl+shift+equal change_background_opacity +0.05
map ctrl+shift+minus change_background_opacity -0.05
map ctrl+shift+0     change_background_opacity default