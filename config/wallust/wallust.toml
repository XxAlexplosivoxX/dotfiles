# --- 1. TEMAS GTK3 Y GTK4 ---
[templates.gtk3]
template = "gtk3.0/style.tmpl"
target = "~/.config/gtk-3.0/gtk.css"

[templates.gtk4]
template = "gtk4.0/style.tmpl"
target = "~/.config/gtk-4.0/gtk.css"

# --- 2. KITTY TERMINAL ---
[templates.kitty]
template = "kitty/kitty.tmpl"
target = "~/.config/kitty/colors-wallust.conf"

# --- 3. WAYBAR ---
[templates.waybar]
template = "waybar/waybar.tmpl"
target = "~/.config/waybar/colors-wallust.css"

# --- 4. HYPRLAND ---
[templates.hyprland]
template = "hyprland/hyprland.tmpl"
target = "~/.config/hypr/conf/colors.lua"

# --- 5. FUZZEL ---
[templates.fuzzel]
template = "fuzzel/fuzzel.tmpl"
target = "~/.config/fuzzel/fuzzel.ini"